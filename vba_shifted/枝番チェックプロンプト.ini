Claude Code に貼り付けるプロンプト（修正版）

あなたはExcel VBAの熟練者です。以下の要件で、手動実行用マクロを作成してください。
このマクロは「常時監視」ではなく、ユーザーが マクロウィンドウ（Alt+F8）から選んで実行します。
マクロ名は 「枝番候補チェック」 にしてください。

1) 対象

対象ブック：このマクロが入っているブック（誤動作防止のため ThisWorkbook を使用）

対象シート：「入力シート」（固定）

対象範囲：2行目以降（A / I / V / X / J 列を参照、Jのみ着色）

2) 目的

条件に該当する I列の値（=Iグループ） を持つ行について、J列セルの背景色を薄いオレンジに変更する。

ただし すでにJ列に背景色が設定されているセルは変更しない（上書きしない）。

3) 判定ロジック（重要）
用語

Iグループ：I列の値が同じ行の集合（Iが空白の行はスキップでOK）

A種別：同一Iグループ内のA列の値の種類（distinct）

3-1) 対象Vコード（カウント対象）

V列の値が次のいずれかに一致するもののみ対象（Trimして比較）：

FDR, FDR1, FDR2, FDL, FDL1, FDL2, BDR, BDR1, BDR2, BDL, BDL1, BDL2

3-2) Vコード数の数え方（Iが同じ かつ Aが同じ範囲で distinct）

同じIグループ内で、さらに **A列が同じ行の集合ごと（= I + A単位）**に、対象Vコードの distinct数を数える。

例：

I="X", A="10" の範囲で V="FDR" が何行あっても 1

I="X", A="20" の範囲で V="FDR" があれば、上とは別枠で 1

そして、Iグループ全体としてのVコード数は、I+Aごとのdistinct数を合計する。
（＝I内でAが違えば同じVコードでも別カウントになる）

この合計を vCountSum とする。

3-3) A列が複数種類なら +1（種類数に関係なく固定で+1）

同じIグループ内のA列の distinct種類数を aTypeCount とする。

aTypeCount >= 2 → aBonus = 1

aTypeCount <= 1 → aBonus = 0

※2種類でも4種類でも +1固定。

3-4) ★追加要件：X列=1 の行数を加点（その数だけ +1）

同じIグループ内で **X列が「1」**の行を数える（数値1/文字"1"の両方を許容、Trimして比較）。
この行数を xCount とする。

例：I="X" のグループ内で X=1 が 3行あれば xCount=3（+3点）

3-5) 最終判定（ここが変更点）

total = vCountSum + aBonus + xCount

total >= 3 の場合、そのIグループは対象

対象となったIグループについて：

I列がその値の行すべての J列セルを薄いオレンジに塗る

ただし 既に背景色があるJセルは変更しない

4) 色の指定

薄いオレンジ：RGB(255, 200, 120) を使用（定数化する）

5) 「既に背景色があるセルは変更しない」判定

J列セルが 未着色のときだけ塗る。
例：If cell.Interior.Pattern = xlNone Then のような判定。

ただしテーマ色等でも誤判定しにくいよう、以下のように 複数条件で堅牢に判定してOK：

Interior.Pattern = xlNone

Interior.ColorIndex = xlColorIndexNone
など

6) 実装要件（速度・安全）

最終行を取得して 2行目～最終行だけ処理

行数が多くても耐えるように、基本は 配列で読み込み + Dictionaryで集計

集計用に以下をDictionaryで持つ：

IごとのA種類Set（distinct）

(I,A)ごとのVコードSet（distinct）（対象Vコードのみ格納）

Iごとの行番号リスト（後でJを塗るため）

IごとのxCount（X=1行数）

変更して良いのは 入力シートのJ列の背景色のみ（値変更禁止）

ScreenUpdating / EnableEvents / Calculation を制御し、必ず元に戻す

実行後に任意で MsgBox（例：「対象Iの件数」「塗ったセル数」など）

7) 納品物

標準モジュール（例：modEdaBanCheck）に作成

Public Sub 枝番候補チェック() を作成（※マクロ名はこれ）

コード全文を提示

VBEでの貼り付け手順も簡潔に書く

この要件どおりに、参照設定不要（CreateObjectのDictionary）で動く、堅牢で高速なVBAコードを提示してください。