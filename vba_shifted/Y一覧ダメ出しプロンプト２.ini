追加ダメ出し（優先度順）

  1. 列見出しの対象範囲が広すぎる可能性
     今の実装は dictAllColNums（入力全体で出た列番）を見出し化しています。
     そのため、抽出対象（2列番以上に跨るI）に一度も関与しない列番まで Y一覧 に出
     ます。
     仕様文脈的には「抽出結果の一覧」なので、arrItems に登場する列番だけに絞る方
     が一致しやすいです。
     該当: modYIchiran.bas:93, modYIchiran.bas:269
  2. 連番の解釈が仕様とズレる可能性（要確認）
     現状は列ごとの独立連番（colCounters(j)）です。
     もし要求者が「1件1行の通し番号（行番号）」を意図していた場合は不一致になり
     ます。
     文面上どちらにも読めるため、サンプルと突合して確定させるべきです。
     該当: modYIchiran.bas:303, modYIchiran.bas:327
  3. 不要変数が残っている
     sheetDeleted は代入のみで未使用です。動作不良には直結しませんが、保守時にノ
     イズになります。
     該当: modYIchiran.bas:250
