 ---
  1. 標準モジュール用コード（modBunkatsuSenban.bas）                                                                                                         
   
  配置先：VBE → 挿入 → 標準モジュール → 以下を貼り付け                                                                                                       
                  
  Option Explicit

  Public Sub 分割線番一覧()
      Dim frm As frmBunkatsu
      Set frm = New frmBunkatsu
      frm.Show
      Set frm = Nothing
  End Sub

  Public Sub ExecuteBunkatsu(ByVal selectedMenName As String)
      ' ... （modBunkatsuSenban.bas の全文）
  End Sub

  2. ユーザーフォーム（frmBunkatsu.frm）

  配置先：VBE → 挿入 → ユーザーフォーム → Nameを frmBunkatsu に設定

  フォーム上に配置するコントロール

  ┌───────────────┬───────────┬─────────────────────────────────────────┐
  │ コントロール  │   Name    │                主な設定                 │
  ├───────────────┼───────────┼─────────────────────────────────────────┤
  │ Label         │ lblTitle  │ Caption: 分割される面名を選んでください │
  ├───────────────┼───────────┼─────────────────────────────────────────┤
  │ ComboBox      │ cboMen    │ Style: 2 - fmStyleDropDownList          │
  ├───────────────┼───────────┼─────────────────────────────────────────┤
  │ CommandButton │ btnOK     │ Caption: OK, Default: True              │
  ├───────────────┼───────────┼─────────────────────────────────────────┤
  │ CommandButton │ btnCancel │ Caption: キャンセル, Cancel: True       │
  └───────────────┴───────────┴─────────────────────────────────────────┘

  フォームのプロパティ

  - Caption: 分割線番一覧
  - StartUpPosition: 1 - CenterOwner
  - Width: 300, Height: 180 程度

  フォームのコードウィンドウに frmBunkatsu.frm の内容を貼り付けてください。

  3. 実行方法

  1. Alt+F8 → 分割線番一覧 を選択 → 実行
  2. コンボボックスで面名を選択 → OK
  3. 「分割線番」シートが作成され、結果が出力される

  4. 出力シートの構成

  ┌─────┬────────────────────────┬──────────┬─────────┐
  │ 行  │          A列           │   B列    │   C列   │
  ├─────┼────────────────────────┼──────────┼─────────┤
  │ 1   │ 選択した面名（例: F1） │          │         │
  ├─────┼────────────────────────┼──────────┼─────────┤
  │ 2   │ 線番                   │ 線サイズ │ 線色    │
  ├─────┼────────────────────────┼──────────┼─────────┤
  │ 3〜 │ I列の値                │ M列の値  │ N列の値 │
  └─────┴────────────────────────┴──────────┴─────────┘

  2行目にオートフィルターが設定されます。