最初の　部品コード抽出マクロ　プロンプト



あなたはExcel VBAの熟練者です。添付の2ファイルを前提に、シーケンス入力シート.xlsm（ただしブック名は変わる可能性あり）にマクロを実装してください。
指定セル（E/F/G列の必要箇所、および条件によりJ列の背景色）以外は変更しないこと。 parts database 側は読み取りのみです。

0. 添付ファイル情報（前提）

ブックA（シーケンス側）: 添付 シーケンス入力シート.xlsm

対象シート名は固定で「入力シート」

ただし ブック名（ファイル名）は変わるので参照は ThisWorkbook を基準にすること

ブックB（DB側）: ファイル名固定 parts database.xlsm

配置場所は社内ネットワーク上の所定パス

シートは複数（全タブ対象）

検索対象列は各シート C列（2行目以降）



1. DBファイルの場所（ネットワーク対応）

parts database はファイル名固定だが、場所はネットワーク上の所定パス想定のため、以下のように実装する：

定数 PARTS_DB_FULLPATH を用意し、そこを優先して開く。

例：Const PARTS_DB_FULLPATH As String = "\\server\share\folder\parts database.xlsm"

もし PARTS_DB_FULLPATH が空（未設定）の場合は、ブックAと同じフォルダから探す（フォールバック）

※見つからない場合はメッセージ表示して終了（書き込み無し）

2. 発火タイミング（イベント）

ブックAのシート「入力シート」で、G列（2行目以降）に文字が入力されたタイミングで処理開始

Worksheet_Change で Target が G2:G最終行に含まれるときのみ動作

空文字になった場合は 何もしない（E/F/GもJ色も変えない）




3. 検索と候補の並び（完全一致→部分一致、かつ一致度順）

入力文字 key で、ブックB（parts database）の全シートの C列（2行目以降） を検索

候補一覧は 2グループに分けて表示し、グループ内は一致度が高い順にソートする：

グループ1：完全一致（最優先・上段）

正規化したC値が key と完全一致（例：Trim、必要なら全角半角・大小を正規化）

グループ2：部分一致（下段）

正規化したC値に key を含むが完全一致ではない

一致度（スコアリング）ソート仕様（可能なら実装）

部分一致を「近い順」にするため、候補ごとにスコアを付けて降順ソートする。例：

1000: 完全一致（グループ1なので基本ここ）

800: 前方一致（Cがkeyで始まる）

650: 単語境界一致っぽい（スペース/記号区切りの直後にkeyが出る等、可能なら）

500: 通常の部分一致（Cの途中にkeyが出る）

追加のタイブレーク（同点の並び替え）：

マッチ位置が早いものを上（InStrの位置が小さい）

Len(C)-Len(key) が小さいものを上（より近い長さ）

最後にCの昇順

※重くなる場合は「前方一致を上、その他を下」程度の簡易スコアでも可。ただし完全一致が必ず上、部分一致が必ず下は絶対。






4. 候補表示（表示列：C → D → A）

候補一覧には同一行の値を この順番で表示：

C列

D列

A列

5. 最大表示件数（差し替え版）

最大表示件数

上限は 100件

まず完全一致を詰め、残り枠に部分一致を詰める

100件超なら「候補が多いので絞ってください」案内を表示



6. UI（UserForm必須・キーボード完結・Esc回避）

UserForm：frmPartsPick

txtFilter（TextBox）: 初期値=key（可能なら入力に応じて絞り込み）

lstCandidates（ListBox）: 3列（C/D/A）

btnOK：決定（Enter）

btnCancel：キャンセル（Escで即キャンセル）

Escでキャンセルした場合は何も書き込まない

候補が1件でも必ずフォームを表示（自動確定しない）

ListBox選択は↑↓、EnterでOK、Escでキャンセル

7. “入力するにつれて絞り込み”

可能なら実装（txtFilter_Change で候補更新）

parts database を毎回走査せず、事前インデックスに対して絞り込みする

重くなる/複雑化しすぎる場合は省略可。ただし 完全一致→部分一致順、Esc回避、キーボード操作は必須

8. 決定時の転記（A→E, B→F, C→G）

選択した parts database の行について、ブックA「入力シート」の編集した行に：

parts A列 → ブックA E列

parts B列 → ブックA F列

parts C列 → ブックA G列

さらに、ブックA「入力シート」の C列に、今回確定した parts の C列と同じ文字が入っている全行に対して、同様に E/F/G を入力する。




9. J列の赤背景ルール（差し替え版：X列にフラグ追加）

J列の赤背景ルール（B案：ON/OFFする、E列の空白込み判定 + X列にフラグ記入）

parts database の同じ行の E列を参照し、ブックA「入力シート」の対象行 J列の背景と X列フラグを制御する。

E列が「1」とみなす条件（重要）

E列の値が 1 かどうかは、次の正規化で判定すること：

文字列化 → 前後Trim

さらに すべての空白を除去（半角スペース " " だけでなく、可能なら全角スペース ChrW(&H3000) も）

その結果が "1" なら 1扱い

数値としての 1 も当然 1扱い

例：

"1" → 1扱い

" 1 " → 1扱い

"　1　"（全角空白）→ 1扱い（可能なら対応）

"0" → 1扱いではない

J列・X列の制御（B案）

DB E列が 1扱い の場合：

J列：背景を赤にする

Interior.Color = RGB(255,0,0)

X列：同じ行のX列セルに 「1」 を記入する（値として 1 / "1" どちらでもよいが統一する）

DB E列が 1扱いでない の場合：

J列：赤を解除して「塗りつぶし無し」に戻す

Interior.Pattern = xlNone（推奨）または .ColorIndex = xlColorIndexNone

X列：同じ行のX列セルは 空白に戻す（=フラグ解除）

このON/OFFは、

編集した行

および C列一致で一括反映した行
の両方に適用する。

※変更を許可するセルは E/F/G列の必要箇所、J列の背景、X列の値（このフラグのみ） に限定する。それ以外は変更禁止。





10. パフォーマンス（必須：全シート走査を避ける）

parts database 全シートC列を毎回走査しない

Workbook_Open または初回起動時にインデックス作成（Dictionary推奨）

インデックスには最低限：SheetName, Row, A,B,C,D,E（※今回E列も必要）を保持する

Application設定（ScreenUpdating/EnableEvents/Calculation）を適切に制御し必ず復帰

Worksheet_Change 無限ループ防止フラグ必須

11. テスト手順も提示

G2入力→フォーム→選択→E/F/G転記

DBのE列=1の行を選ぶ→入力シート同行Jが赤

Escキャンセル→E/F/G/Jは変化なし

C列同値の行が複数→E/F/Gが反映、さらにE列=1ならJが赤

完全一致が上、部分一致が下

50件制限動作




（他の要件：G列Changeで起動、UserForm必須、Escキャンセル、Enter決定、候補1件でもフォーム表示、表示列C/D/A、最大50件、インデックス化、ReadOnlyでDB、等は前回の最終版のまま完全に満たすこと。）

もし「一致度順」をもう一段良くしたい場合のオプション

key と候補Cの 類似度（編集距離/Levenshtein） は重くなる可能性があるので原則NG

代わりに上の「前方一致＋マッチ位置＋長さ差」で十分実務的